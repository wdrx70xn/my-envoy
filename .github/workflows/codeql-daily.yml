name: CodeQL/daily
permissions:
  contents: read
'on':
  schedule:
  - cron: 0 12 * * 4
concurrency:
  group: ${{ github.head_ref || github.run_id }}-${{ github.workflow }}
  cancel-in-progress: true
jobs:
  CodeQL-Build:
    permissions:
      security-events: write
      pull-requests: read
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    if: github.repository == 'envoyproxy/envoy'
    steps:
    - name: Checkout repository
      uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871
    - name: Free disk space
      uses: envoyproxy/toolshed/gh-actions/diskspace@actions-v0.2.37
    - name: Initialize CodeQL
      uses: github/codeql-action/init@f779452ac5af1c261dce0346a8f964149f49322b
      with:
        languages: cpp
    - name: Install deps
      shell: bash
      run: "sudo apt-get update --error-on=any\nsudo apt-get install --yes \\\n  \
        \  libtool cmake automake autoconf make ninja-build curl unzip \\\n    virtualenv\
        \ openjdk-11-jdk build-essential libc++1\n# Note: the llvm/clang version should\
        \ match the version specifed in:\n#  - bazel/repository_locations.bzl\n# \
        \ - .github/workflows/codeql-push.yml\n#  - https://github.com/envoyproxy/envoy-build-tools/blob/main/build_container/build_container_ubuntu.sh#L84\n\
        mkdir -p bin/clang14\ncd bin/clang14\nwget https://github.com/llvm/llvm-project/releases/download/llvmorg-14.0.0/clang+llvm-14.0.0-x86_64-linux-gnu-ubuntu-18.04.tar.xz\n\
        tar -xf clang+llvm-14.0.0-x86_64-linux-gnu-ubuntu-18.04.tar.xz --strip-components\
        \ 1\n"
    - name: Build
      run: "bazel/setup_clang.sh bin/clang14\nbazelisk shutdown\nbazel build \\\n\
        \    -c fastbuild \\\n    --spawn_strategy=local \\\n    --discard_analysis_cache\
        \ \\\n    --nouse_action_cache \\\n    --features=\"-layering_check\" \\\n\
        \    --config=clang-libc++ \\\n    --config=ci \\\n    //source/common/http/...\n"
    - name: Clean Artifacts
      run: 'git clean -xdf

        '
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@f779452ac5af1c261dce0346a8f964149f49322b
