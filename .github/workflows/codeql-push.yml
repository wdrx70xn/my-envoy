name: CodeQL/push
permissions:
  contents: read
'on':
  push:
    paths:
    - include/**
    - source/common/**
    branches-ignore:
    - dependabot/**
  pull_request: null
concurrency:
  group: ${{ github.head_ref || github.run_id }}-${{ github.workflow }}
  cancel-in-progress: true
env:
  SEARCH_FOLDER: //source/common/...
jobs:
  CodeQL-Build:
    permissions:
      actions: read
      contents: read
      security-events: write
      pull-requests: read
    runs-on: ubuntu-latest
    if: github.repository == 'envoyproxy/envoy'
    steps:
    - name: Checkout repository
      uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871
      with:
        fetch-depth: 2
    - name: Get build targets
      run: "# TODO(phlax): Shift this to an action\ncompare_head () {\n    while IFS=\
        \ read -r line; do\n        if [[ -n \"$line\" ]]; then\n            bazel\
        \ query \"rdeps($SEARCH_FOLDER, $line, 1)\"  2> /dev/null\n        fi\n  \
        \  done < <(git diff --name-only HEAD \"${1}\" -- source/* include/*)\n}\n\
        if [[ \"$GIT_EVENT\" == \"pull_request\" ]]; then\n    git fetch \"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}\"\
        \ main 2> /dev/null\n    TO_OTHER=FETCH_HEAD\nelse\n    TO_OTHER=HEAD^1\n\
        fi\nBUILD_TARGETS=\"$(compare_head \"$TO_OTHER\" | grep -v '\\.cc\\|\\.h'\
        \ | sort -u | head -n 3)\"\necho 'BUILD_TARGETS<<EOF' >> $GITHUB_ENV\necho\
        \ \"$BUILD_TARGETS\" >> $GITHUB_ENV\necho 'EOF' >> $GITHUB_ENV\n"
      env:
        GIT_EVENT: ${{ github.event_name }}
    - name: Free disk space
      if: ${{ env.BUILD_TARGETS != '' }}
      uses: envoyproxy/toolshed/gh-actions/diskspace@actions-v0.2.37
    - name: Initialize CodeQL
      if: ${{ env.BUILD_TARGETS != '' }}
      uses: github/codeql-action/init@f779452ac5af1c261dce0346a8f964149f49322b
      with:
        languages: cpp
    - name: Install deps
      if: ${{ env.BUILD_TARGETS != '' }}
      shell: bash
      run: "sudo apt-get update --error-on=any\nsudo apt-get install --yes \\\n  \
        \  libtool cmake automake autoconf make ninja-build curl \\\n    unzip virtualenv\
        \ openjdk-11-jdk build-essential libc++1\n# Note: the llvm/clang version should\
        \ match the version specifed in:\n#  - bazel/repository_locations.bzl\n# \
        \ - .github/workflows/codeql-daily.yml\n#  - https://github.com/envoyproxy/envoy-build-tools/blob/main/build_container/build_container_ubuntu.sh#L84\n\
        mkdir -p bin/clang14\ncd bin/clang14\nwget https://github.com/llvm/llvm-project/releases/download/llvmorg-14.0.0/clang+llvm-14.0.0-x86_64-linux-gnu-ubuntu-18.04.tar.xz\n\
        tar -xf clang+llvm-14.0.0-x86_64-linux-gnu-ubuntu-18.04.tar.xz --strip-components\
        \ 1\n"
    - name: Build
      if: ${{ env.BUILD_TARGETS != '' }}
      run: "bazel/setup_clang.sh bin/clang14\nbazel shutdown\nbazel build \\\n   \
        \ -c fastbuild \\\n    --spawn_strategy=local \\\n    --discard_analysis_cache\
        \ \\\n    --nouse_action_cache \\\n    --features=\"-layering_check\" \\\n\
        \    --config=clang-libc++ \\\n    --config=ci \\\n    $BUILD_TARGETS\necho\
        \ -e \"Built targets...\\n$BUILD_TARGETS\"\n"
    - name: Clean Artifacts
      if: ${{ env.BUILD_TARGETS != '' }}
      run: 'git clean -xdf

        '
    - name: Perform CodeQL Analysis
      if: ${{ env.BUILD_TARGETS != '' }}
      uses: github/codeql-action/analyze@f779452ac5af1c261dce0346a8f964149f49322b
